<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>210정형외과 병동관리시스템</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: 'Malgun Gothic', sans-serif; background: #f8fafc; }
    .bed-card { cursor: pointer; transition: all 0.2s; border-radius: 1rem; padding: 1.25rem; background: white; border: 2px solid #f1f5f9; }
    .bed-card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-color: #3b82f6; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
    .modal-box { background: white; border-radius: 1.25rem; padding: 2rem; width: 100%; max-width: 400px; }
  </style>
</head>
<body>
  <div id="root">
    <div class="flex items-center justify-center h-screen">
      <p class="text-gray-400 animate-pulse">시스템을 불러오는 중입니다...</p>
    </div>
  </div>

  <script type="text/babel">
    // --- 3. Firebase 초기화 (API Key 공백 제거 완료) ---
    const firebaseConfig = {
      apiKey: "AIzaSyDNskn4Kmkha07oGXCEXVhhNd9MvG0gcPI", // 공백 제거됨
      authDomain: "gen-lang-client-0584117357.firebaseapp.com",
      projectId: "gen-lang-client-0584117357",
      storageBucket: "gen-lang-client-0584117357.firebasestorage.app",
      messagingSenderId: "117986366738",
      appId: "1:117986366738:web:08d7b55ac07479d9cf4fcb"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // --- 4. React 컴포넌트 ---
    const { useState, useEffect } = React;

    const STATUS_MAP = {
      empty: { label: '비어 있음', color: '#94a3b8', bg: '#f8fafc' },
      admitted: { label: '입원 중', color: '#3b82f6', bg: '#eff6ff' },
      morning: { label: '오전 퇴원', color: '#f59e0b', bg: '#fffbeb' },
      afternoon: { label: '오후 퇴원', color: '#f97316', bg: '#fff7ed' }
    };

    function App() {
      const [beds, setBeds] = useState({});
      const [selectedId, setSelectedId] = useState(null);
      const [editData, setEditData] = useState({ name: '', status: 'empty', memo: '' });
      
      const bedIds = ['501', '502', '503', '504', '505', '506', '507', '508', '509'];

      // 실시간 데이터 동기화 (전체 병상 감시)
      useEffect(() => {
        const unsubscribe = db.collection("ward").onSnapshot((snapshot) => {
          const newBeds = {};
          snapshot.forEach(doc => {
            newBeds[doc.id] = doc.data();
          });
          setBeds(newBeds);
        });
        return () => unsubscribe();
      }, []);

      const openEdit = (id) => {
        setSelectedId(id);
        const current = beds[id] || { name: '', status: 'empty', memo: '' };
        setEditData({ ...current });
      };

      const handleSave = async () => {
        try {
          // { merge: true }로 다른 사용자의 수정을 덮어쓰지 않도록 보호
          await db.collection("ward").doc(selectedId).set(editData, { merge: true });
          setSelectedId(null);
        } catch (e) {
          alert("저장에 실패했습니다. 인터넷 연결을 확인하세요.");
        }
      };

      return (
        <div className="max-w-5xl mx-auto p-6 md:p-12">
          <header className="mb-10 text-center md:text-left">
            <h1 className="text-3xl font-black text-slate-800 tracking-tight">210 정형외과 병동관리</h1>
            <p className="text-slate-400 mt-1">실시간 데이터 동기화 시스템</p>
          </header>
          
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            {bedIds.map(id => {
              const info = beds[id] || { status: 'empty', name: '' };
              const style = STATUS_MAP[info.status] || STATUS_MAP.empty;
              return (
                <div key={id} className="bed-card" style={{ backgroundColor: style.bg }} onClick={() => openEdit(id)}>
                  <div className="flex justify-between items-center mb-6">
                    <span className="text-2xl font-black text-slate-700">{id}</span>
                    <span className="text-[11px] font-black px-2.5 py-1 rounded-full text-white" style={{ backgroundColor: style.color }}>
                      {style.label}
                    </span>
                  </div>
                  <div className="h-12 flex items-center">
                    {info.name ? (
                      <span className="text-xl font-bold text-slate-800">{info.name} <small className="text-sm font-normal text-slate-400">님</small></span>
                    ) : (
                      <span className="text-slate-300 italic">비어 있음</span>
                    )}
                  </div>
                  <div className="mt-4 pt-4 border-t border-slate-100 text-xs text-slate-400 truncate">
                    {info.memo || "기록된 메모 없음"}
                  </div>
                </div>
              );
            })}
          </div>

          {/* 수정 모달 */}
          {selectedId && (
            <div className="modal-overlay" onClick={() => setSelectedId(null)}>
              <div className="modal-box shadow-2xl" onClick={e => e.stopPropagation()}>
                <h2 className="text-xl font-bold mb-6 text-slate-800 border-b pb-3">{selectedId}호 상세 정보</h2>
                <div className="space-y-5">
                  <div>
                    <label className="block text-[11px] font-black text-slate-400 uppercase mb-1.5">현재 상태</label>
                    <select 
                      className="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-blue-500 outline-none transition-all"
                      value={editData.status}
                      onChange={e => setEditData({...editData, status: e.target.value})}
                    >
                      {Object.entries(STATUS_MAP).map(([val, {label}]) => (
                        <option key={val} value={val}>{label}</option>
                      ))}
                    </select>
                  </div>
                  <div>
                    <label className="block text-[11px] font-black text-slate-400 uppercase mb-1.5">환자 성함</label>
                    <input 
                      className="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-blue-500 outline-none transition-all"
                      value={editData.name}
                      onChange={e => setEditData({...editData, name: e.target.value})}
                      placeholder="성함을 입력하세요"
                    />
                  </div>
                  <div>
                    <label className="block text-[11px] font-black text-slate-400 uppercase mb-1.5">비고 (메모)</label>
                    <textarea 
                      className="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-blue-500 outline-none h-28 resize-none transition-all"
                      value={editData.memo}
                      onChange={e => setEditData({...editData, memo: e.target.value})}
                      placeholder="참고 사항을 입력하세요"
                    />
                  </div>
                </div>
                <div className="flex gap-3 mt-8">
                  <button className="flex-1 bg-slate-100 text-slate-500 font-bold py-3.5 rounded-xl hover:bg-slate-200" onClick={() => setSelectedId(null)}>닫기</button>
                  <button className="flex-1 bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-100 hover:bg-blue-700" onClick={handleSave}>저장하기</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

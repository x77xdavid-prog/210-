<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>210정형외과병동관리시스템</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: 'Malgun Gothic', sans-serif; background: #f0f2f5; margin: 0; }
    .bed-card { cursor: pointer; transition: all 0.2s; border: 2px solid #e5e7eb; border-radius: 12px; padding: 16px; background: white; }
    .bed-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-box { background: white; border-radius: 16px; padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // --- 3. Firebase 초기화 ---
    const firebaseConfig = {
      apiKey: "AIzaSyDNskn4Kmkha07oGXCEXVhhNd9MvG0gcPI",
      authDomain: "gen-lang-client-0584117357.firebaseapp.com",
      projectId: "gen-lang-client-0584117357",
      storageBucket: "gen-lang-client-0584117357.firebasestorage.app",
      messagingSenderId: "117986366738",
      appId: "1:117986366738:web:08d7b55ac07479d9cf4fcb"
    };

    // 앱이 중복 초기화되지 않도록 체크
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // --- 4. React 컴포넌트 ---
    const { useState, useEffect } = React;

    const STATUS_MAP = {
      empty: { label: '비어 있음', color: '#9ca3af', bg: '#f9fafb' },
      admitted: { label: '입원 중', color: '#3b82f6', bg: '#eff6ff' },
      morning_discharge: { label: '오전 퇴원 예정', color: '#f59e0b', bg: '#fffbeb' },
      afternoon_discharge: { label: '오후 퇴원 예정', color: '#f97316', bg: '#fff7ed' }
    };

    function App() {
      const [beds, setBeds] = useState({});
      const [selectedId, setSelectedId] = useState(null);
      const [editData, setEditData] = useState({ name: '', status: 'empty', memo: '' });
      
      const bedIds = ['501', '502', '503', '504', '505', '506', '507', '508', '509'];

      // 데이터 실시간 감시 (onSnapshot)
      useEffect(() => {
        const unsubs = bedIds.map(id => 
          db.collection("ward").doc(id).onSnapshot((doc) => {
            if (doc.exists) {
              setBeds(prev => ({ ...prev, [id]: doc.data() }));
            }
          })
        );
        return () => unsubs.forEach(unsub => unsub());
      }, []);

      // 수정 창 열기
      const openEdit = (id) => {
        setSelectedId(id);
        const current = beds[id] || { name: '', status: 'empty', memo: '' };
        setEditData({ ...current });
      };

      // 서버에 저장 (병합 모드)
      const handleSave = async () => {
        try {
          await db.collection("ward").doc(selectedId).set(editData, { merge: true });
          setSelectedId(null);
        } catch (e) {
          alert("저장 실패!");
        }
      };

      return (
        <div className="max-w-4xl mx-auto p-4 sm:p-8">
          <header className="mb-8 flex justify-between items-end">
            <div>
              <h1 className="text-3xl font-black text-slate-800">210 병동관리</h1>
              <p className="text-slate-500 font-medium">실시간 통합 관리 시스템</p>
            </div>
            <div className="text-right text-xs text-slate-400">
              최종 업데이트: {new Date().toLocaleTimeString()}
            </div>
          </header>
          
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
            {bedIds.map(id => {
              const info = beds[id] || { status: 'empty', name: '' };
              const style = STATUS_MAP[info.status] || STATUS_MAP.empty;
              return (
                <div key={id} className="bed-card" style={{ backgroundColor: style.bg }} onClick={() => openEdit(id)}>
                  <div className="flex justify-between items-start mb-4">
                    <span className="text-2xl font-bold text-slate-700">{id}</span>
                    <span className="text-[10px] font-bold px-2 py-1 rounded text-white" style={{ backgroundColor: style.color }}>
                      {style.label}
                    </span>
                  </div>
                  <div className="min-h-[3rem]">
                    {info.name ? (
                      <div className="text-lg font-bold text-slate-800">{info.name} <span className="text-sm font-normal text-slate-500">님</span></div>
                    ) : (
                      <div className="text-slate-400 italic">비어 있음</div>
                    )}
                  </div>
                  <div className="mt-4 pt-3 border-t border-slate-100 text-xs text-slate-500 truncate">
                    {info.memo || "특이사항 없음"}
                  </div>
                </div>
              );
            })}
          </div>

          {/* 수정 모달 */}
          {selectedId && (
            <div className="modal-overlay" onClick={() => setSelectedId(null)}>
              <div className="modal-box" onClick={e => e.stopPropagation()}>
                <h2 className="text-xl font-bold mb-6 text-slate-800">{selectedId}호 정보 수정</h2>
                <div className="space-y-4">
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">환자 상태</label>
                    <select 
                      className="w-full border-2 border-slate-100 p-3 rounded-lg focus:border-blue-500 outline-none"
                      value={editData.status}
                      onChange={e => setEditData({...editData, status: e.target.value})}
                    >
                      {Object.entries(STATUS_MAP).map(([val, {label}]) => (
                        <option key={val} value={val}>{label}</option>
                      ))}

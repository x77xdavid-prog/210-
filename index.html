<script type="module">
  // Firebase SDK 가져오기
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

  // 질문자님의 설정값
  const firebaseConfig = {
    apiKey: "AIzaSyDNskn4Kmkha07oGXCEXVhhNd9MvG0gcPI",
    authDomain: "gen-lang-client-0584117357.firebaseapp.com",
    projectId: "gen-lang-client-0584117357",
    storageBucket: "gen-lang-client-0584117357.firebasestorage.app",
    messagingSenderId: "117986366738",
    appId: "1:117986366738:web:08d7b55ac07479d9cf4fcb",
    measurementId: "G-99DNYLR26W"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 전역 변수로 설정 (기존 HTML 버튼에서 호출할 수 있게)
  window.db = db;
  window.doc = doc;
  window.setDoc = setDoc;

  // --- 추가: 데이터 실시간 불러오기 ---
  // 페이지가 로드될 때 Firebase에서 데이터를 가져와 화면에 그립니다.
  const bedIds = ['501', '502', '503', '504', '505', '506', '507', '508', '509'];
  bedIds.forEach(id => {
    onSnapshot(doc(db, "ward", id), (docSnap) => {
      if (docSnap.exists()) {
        const data = docSnap.data();
        updateUI(id, data);
      }
    });
  });

  function updateUI(id, data) {
    const card = document.getElementById(`bed-${id}`);
    if (!card) return;
    
    card.className = `bed-card ${data.status}`;
    card.querySelector('.status-badge').textContent = getStatusText(data.status);
    card.querySelector('.patient-info').innerHTML = `
      <strong>${data.name}</strong> · ${data.gender} · ${data.age}세<br>
      <small>${data.diagnosis}</small>
    `;
    card.querySelector('.date-info').innerHTML = `
      입원일 ${data.admissionDate}<br>
      퇴원일 ${data.dischargeDate} · ${data.dDay}
    `;
    card.querySelector('.memo-info').textContent = data.memo;
  }

  function getStatusText(status) {
    const texts = { 'empty': '비어 있음', 'occupied': '입원 중', 'scheduled-in': '오후 입원 예정', 'scheduled-out': '오전 퇴원 예정' };
    return texts[status] || '상태 미정';
  }
</script>

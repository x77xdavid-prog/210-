  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Malgun Gothic', -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      background: #f0f2f5;
      min-height: 100vh;
    }
    .bed-card {
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      user-select: none;
    }
    .bed-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.14) !important;
    }
    .bed-card.overdue {
      animation: overdue-pulse 1.8s ease-in-out infinite;
    }
    @keyframes overdue-pulse {
      0%, 100% { box-shadow: 0 0 0 2px transparent; }
      50%       { box-shadow: 0 0 0 3px #ef4444; }
    }
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .modal-box {
      background: white;
      border-radius: 14px;
      padding: 24px;
      width: 500px;
      max-width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .form-input {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid #e5e7eb;
      border-radius: 7px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      background: #fafafa;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
      background: white;
    }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 5px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .btn {
      padding: 9px 18px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.97); }
    .btn-primary  { background: #3b82f6; color: white; }
    .btn-danger   { background: #ef4444; color: white; }
    .btn-gray     { background: #e5e7eb; color: #374151; }
    .btn-green    { background: #22c55e; color: white; }
    .btn-sm       { padding: 5px 11px; font-size: 12px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 99px; }
    .status-dot {
      display: inline-block;
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .section-divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 16px 0;
    }
    .sync-indicator {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
    }
    .sync-ok { background: #dcfce7; color: #166534; }
    .sync-saving { background: #fef9c3; color: #854d0e; }
    .sync-error { background: #fee2e2; color: #991b1b; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }
  </style>

<div id="root"><div class="flex items-center justify-center min-h-screen bg-gray-100 p-4"><div class="bg-white p-10 rounded-2xl shadow-xl text-center w-full" style="max-width: 520px;"><h1 class="text-2xl font-black mb-2" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">210정형외과 병동관리시스템</h1><p class="text-gray-500 mb-8 text-sm">여러 기기에서 병동 현황을 동기화하려면 로그인하세요.</p><form class="space-y-4"><input type="email" placeholder="이메일" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required="" value=""><input type="password" placeholder="비밀번호" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required="" value=""><button type="submit" class="w-full bg-blue-500 text-white py-3 rounded-lg font-bold hover:bg-blue-600 disabled:opacity-50">로그인</button></form><button type="button" class="mt-4 text-blue-500 hover:underline">계정이 없으신가요? 회원가입</button></div></div></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

const STATUS = {
  empty: { label: '비어 있음', color: '#9ca3af', bg: '#f9fafb', border: '#e5e7eb', textColor: '#6b7280', badgeBg: '#e5e7eb', badgeText: '#4b5563' },
  admitted: { label: '입원 중', color: '#3b82f6', bg: '#eff6ff', border: '#bfdbfe', textColor: '#1e40af', badgeBg: '#3b82f6', badgeText: '#ffffff' },

  afternoon_discharge: { label: '오후 퇴원 예정', color: '#f97316', bg: '#fff7ed', border: '#fed7aa', textColor: '#9a3412', badgeBg: '#f97316', badgeText: '#ffffff' },
  afternoon_admission: { label: '오후 입원 예정', color: '#22c55e', bg: '#f0fdf4', border: '#bbf7d0', textColor: '#14532d', badgeBg: '#22c55e', badgeText: '#ffffff' },
  next_day_discharge: { label: '다음날 퇴원 예정', color: '#a855f7', bg: '#faf5ff', border: '#e9d5ff', textColor: '#581c87', badgeBg: '#a855f7', badgeText: '#ffffff' },
  provisional_discharge: { label: '가퇴원', color: '#f43f5e', bg: '#fff1f2', border: '#fecdd3', textColor: '#881337', badgeBg: '#f43f5e', badgeText: '#ffffff' },
};

const DEFAULT_SETTINGS = {
  wardName: '210정형외과병동관리시스템',
  totalBeds: 20,
  bedPrefix: '',
  startBedNumber: 1,
  morningCutoff: '12:00',
  afternoonCutoff: '18:00',
  autoTransition: false,
};

const EMPTY_PATIENT = { name: '', age: '', gender: '', diagnosis: '', notes: '', isSurgery: false, admittedDate: '', dischargeDate: '' };

/* ── Firebase 초기화 ── */
const FIREBASE_CONFIG = {
  apiKey: 'AIzaSyDNskn4Kmkha07oGXcEXVhhNd9MvGOgcpI',
  authDomain: 'gen-lang-client-0584117357.firebaseapp.com',

/* ── 유틸리티 ── */
function parseTime(str) {
  const [h = 0, m = 0] = (str || '').split(':').map(Number);
  return h * 60 + m;
}
function getCurrentMinutes() {
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}
function isOverdue(status, settings) {
  const cur = getCurrentMinutes();
  if (status === 'morning_discharge')   return cur > parseTime(settings.morningCutoff);
  if (status === 'afternoon_discharge') return cur > parseTime(settings.afternoonCutoff);
  return false;
}
function getNowDisplay() {
  const n = new Date();
  return {
    timeStr: n.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
    dateStr: n.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' }),
  };
}
function getDdayDisplay(dateStr) {
  if (!dateStr) return '';
  const target = new Date(`${dateStr}T00:00:00`);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((target - today) / 86400000);
  if (diff === 0) return 'D-day';
  return diff > 0 ? `D-${diff}` : `D+${Math.abs(diff)}`;
}
function makeBeds(total, start, prefix, existing = []) {
  return Array.from({ length: total }, (_, i) => {
    const num = start + i;
    const id = `${prefix}${num}`;
    const found = existing.find(b => b.id === id);
    return found || { id, bedNumber: id, status: 'empty', patient: { ...EMPTY_PATIENT } };
  });
}
function loadLocalStorage() {
  try { return JSON.parse(localStorage.getItem('wardData_v2')); } catch { return null; }
}
function saveLocalStorage(data) {
  try { localStorage.setItem('wardData_v2', JSON.stringify(data)); } catch {}
}

/* ── Firebase 인증 헬퍼 ── */
function signUpUser(email, password) {
  return auth.createUserWithEmailAndPassword(email, password).then(r => r.user.uid);
}
function signInUser(email, password) {
  return auth.signInWithEmailAndPassword(email, password).then(r => r.user.uid);
}
function signOutUser() { return auth.signOut(); }


/* ══════════════════════════════════════════════
   커스텀 훅: useFirestoreSync
   
   핵심 수정사항:
   1. onSnapshot만 사용 (loadAndSubscribe 제거 → race condition 해결)
   2. isRemoteUpdate ref로 "원격 수신 중" 플래그 관리
      → 원격 데이터 수신 시 state 업데이트 해도 save가 트리거되지 않음
   3. 디바운스된 save로 과도한 쓰기 방지
   4. 동기화 상태 표시 (저장 중 / 완료 / 오류)
   ══════════════════════════════════════════════ */
function useFirestoreSync(userId) {
  const [settings, setSettings] = useState(() => {
    const stored = loadLocalStorage();
    return { ...DEFAULT_SETTINGS, ...(stored?.settings || {}) };
  });
  const [beds, setBeds] = useState(() => {
    const stored = loadLocalStorage();
    return stored?.beds?.length ? stored.beds : makeBeds(DEFAULT_SETTINGS.totalBeds, DEFAULT_SETTINGS.startBedNumber, DEFAULT_SETTINGS.bedPrefix);
  });
  const [syncStatus, setSyncStatus] = useState('idle'); // idle | saving | saved | error

  // ── refs로 최신 값 추적 ──
  const settingsRef = useRef(settings);
  const bedsRef     = useRef(beds);
  const isRemoteUpdate = useRef(false);   // 원격 업데이트 수신 중 플래그
  const saveTimerRef   = useRef(null);     // 디바운스 타이머
  const isFirstSnapshot = useRef(true);    // 첫 스냅샷 여부

  settingsRef.current = settings;
  bedsRef.current     = beds;

  // ── Firestore에 저장 (디바운스) ──
  const saveToFirestore = useCallback((newSettings, newBeds) => {
    if (!userId) return;

    // 로컬 스토리지는 즉시 저장
    saveLocalStorage({ settings: newSettings, beds: newBeds });

    // Firestore는 디바운스 (500ms)
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    setSyncStatus('saving');

    saveTimerRef.current = setTimeout(async () => {
      try {
        await db.collection('wardData').doc(userId).set({
          settings: newSettings,
          beds: newBeds,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        setSyncStatus('saved');
        // 3초 후 표시 숨김
        setTimeout(() => setSyncStatus(prev => prev === 'saved' ? 'idle' : prev), 3000);
      } catch (err) {
        console.error('Firestore save failed:', err);
        setSyncStatus('error');
      }
    }, 500);
  }, [userId]);

  // ── 로컬 상태 업데이트 래퍼 (사용자 조작 시) ──
  const updateSettings = useCallback((newSettings) => {
    setSettings(newSettings);
    // 원격 수신 중이 아닐 때만 Firestore에 저장
    if (!isRemoteUpdate.current) {
      // 다음 tick에서 beds 최신값과 함께 저장
      setTimeout(() => saveToFirestore(newSettings, bedsRef.current), 0);
    }
  }, [saveToFirestore]);

  const updateBeds = useCallback((updaterOrValue) => {
    setBeds(prev => {
      const newBeds = typeof updaterOrValue === 'function' ? updaterOrValue(prev) : updaterOrValue;
      // 원격 수신 중이 아닐 때만 Firestore에 저장
      if (!isRemoteUpdate.current) {
        setTimeout(() => saveToFirestore(settingsRef.current, newBeds), 0);
      }
      return newBeds;
    });
  }, [saveToFirestore]);

  // ── onSnapshot 실시간 리스너 ──
  useEffect(() => {
    if (!userId) return;

    isFirstSnapshot.current = true;

    const unsubscribe = db.collection('wardData').doc(userId).onSnapshot(
      (doc) => {
        if (doc.exists && doc.data()?.beds) {
          const data = doc.data();

          // 서버 타임스탬프가 포함된 자기 자신의 write-back인지 확인
          // metadata.hasPendingWrites가 true면 로컬에서 방금 쓴 것 → 무시
          if (doc.metadata.hasPendingWrites) {
            return;
          }

          // 원격 업데이트 플래그 ON → setState 해도 save 트리거 안 됨
          isRemoteUpdate.current = true;

          if (data.settings) setSettings(data.settings);
          if (Array.isArray(data.beds)) setBeds(data.beds);

          // 로컬 스토리지도 갱신
          saveLocalStorage({ settings: data.settings || settingsRef.current, beds: data.beds });

          // 플래그 해제 (다음 tick)
          setTimeout(() => { isRemoteUpdate.current = false; }, 0);

          if (isFirstSnapshot.current) {
            isFirstSnapshot.current = false;
            setSyncStatus('saved');
            setTimeout(() => setSyncStatus(prev => prev === 'saved' ? 'idle' : prev), 2000);
          }
        } else if (isFirstSnapshot.current) {
          // 문서가 없으면 현재 로컬 데이터를 업로드
          isFirstSnapshot.current = false;
          saveToFirestore(settingsRef.current, bedsRef.current);
        }
      },
      (err) => {
        console.error('onSnapshot error:', err);
        setSyncStatus('error');
      }
    );

    return () => {
      unsubscribe();
      if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    };
  }, [userId, saveToFirestore]);

  return { settings, beds, updateSettings, updateBeds, syncStatus };
}


/* ── 컴포넌트: BedCard ── */
function BedCard({ bed, settings, onClick, onQuickDischarge }) {
  const cfg = STATUS[bed.status] || STATUS.empty;
  const overdue = isOverdue(bed.status, settings);
  const isEmpty = bed.status === 'empty';
  const hasPatient = !isEmpty && bed.patient.name;

  return (
    <div
      className={`bed-card rounded-xl border-2 p-3${overdue ? ' overdue' : ''}`}
      style={{ background: cfg.bg, borderColor: cfg.border, boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}
      onClick={() => onClick(bed)}
    >
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 4, marginBottom: 7 }}>
        <span style={{ fontWeight: 800, fontSize: 17, color: '#111827', letterSpacing: '-0.5px' }}>{bed.bedNumber}호</span>
        <span style={{ fontSize: 10, fontWeight: 700, padding: '2px 7px', borderRadius: 999, whiteSpace: 'nowrap', background: cfg.badgeBg, color: cfg.badgeText }}>
          {cfg.label}
        </span>
      </div>
      {hasPatient ? (
        <div>
          <div style={{ fontSize: 13, fontWeight: 700, color: cfg.textColor, marginBottom: 2 }}>
            {bed.patient.name}{bed.patient.gender ? `・${bed.patient.gender === 'M' ? '남' : '여'}` : ''}{bed.patient.age ? `・${bed.patient.age}세` : ''}
          </div>
          {bed.patient.diagnosis && <div style={{ fontSize: 11, color: '#9ca3af', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{bed.patient.diagnosis}</div>}
          {bed.patient.admittedDate && (
            <div style={{ fontSize: 11, fontWeight: 600, color: '#374151', marginTop: 4 }}>입원일 {bed.patient.admittedDate}</div>
          )}
          {bed.patient.dischargeDate && (
            <div style={{ fontSize: 11, fontWeight: 600, color: '#374151', marginTop: 4 }}>퇴원일 {bed.patient.dischargeDate} ・ {getDdayDisplay(bed.patient.dischargeDate)}</div>
          )}
          {bed.patient.notes && (
            <div style={{ fontSize: 11, fontWeight: 600, color: '#374151', marginTop: 4, whiteSpace: 'normal', wordBreak: 'break-word' }}>메모 {bed.patient.notes}</div>
          )}
          {bed.patient.isSurgery && <div style={{ fontSize: 10, color: '#f97316', fontWeight: 700, marginTop: 3 }}>[수술 환자]</div>}
        </div>
      ) : <div style={{ fontSize: 12, color: '#d1d5db', fontStyle: 'italic' }}>{isEmpty ? '빈 병상' : '정보 없음'}</div>}
      {overdue && (
        <div style={{ marginTop: 6, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }} onClick={e => e.stopPropagation()}>
          <span style={{ fontSize: 11, color: '#ef4444', fontWeight: 700 }}>시간 초과</span>
          <button className="btn btn-sm btn-danger" onClick={e => { e.stopPropagation(); onQuickDischarge(bed); }} style={{ padding: '3px 8px', fontSize: 11 }}>퇴원 완료</button>
        </div>
      )}
    </div>
  );
}

/* ── 컴포넌트: BedModal ── */
function BedModal({ bed, onSave, onClose }) {
  const [status, setStatus] = useState(bed.status);
  const [patient, setPatient] = useState({ ...EMPTY_PATIENT, ...bed.patient });
  const setField = (f, v) => setPatient(p => ({ ...p, [f]: v }));

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box">
        <div className="flex justify-between items-center mb-4">
          <h2 className="text-xl font-extrabold">{bed.bedNumber}호 병상 편집</h2>
          <button className="btn btn-gray btn-sm" onClick={onClose}>닫기</button>
        </div>
        <div className="mb-4">
          <div className="form-label">병상 상태</div>
          <div className="grid grid-cols-2 gap-2">
            {Object.entries(STATUS).map(([key, scfg]) => (
              <button key={key} onClick={() => setStatus(key)}
                className={`flex items-center gap-2 p-2 rounded-lg border-2 text-xs transition-all ${status === key ? 'font-bold' : 'bg-white text-gray-500'}`}
                style={{ borderColor: status === key ? scfg.color : '#e5e7eb', background: status === key ? scfg.bg : '' }}>
                <span className="status-dot" style={{ background: scfg.color }} /> {scfg.label}
              </button>
            ))}
          </div>
        </div>
        {status !== 'empty' && (
          <div className="space-y-3">
            <hr className="section-divider" />
            <div className="grid grid-cols-2 gap-2">
              <div><label className="form-label">환자명</label><input className="form-input" value={patient.name} onChange={e => setField('name', e.target.value)} /></div>
              <div><label className="form-label">나이</label><input className="form-input" type="number" value={patient.age} onChange={e => setField('age', e.target.value)} /></div>
            </div>
            <div className="grid grid-cols-2 gap-2">
              <div><label className="form-label">성별</label><select className="form-input" value={patient.gender} onChange={e => setField('gender', e.target.value)}><option value="">선택</option><option value="M">남</option><option value="F">여</option></select></div>
              <div><label className="form-label">입원일</label><input className="form-input" type="date" value={patient.admittedDate} onChange={e => setField('admittedDate', e.target.value)} /></div>
            </div>
            <div className="grid grid-cols-2 gap-2">
              <div><label className="form-label">퇴원일</label><input className="form-input" type="date" value={patient.dischargeDate} onChange={e => setField('dischargeDate', e.target.value)} /></div>
              {patient.dischargeDate && (
                <div>
                  <label className="form-label">남은 D-day</label>
                  <div className="form-input" style={{ background: '#ffffff', cursor: 'default' }}>{getDdayDisplay(patient.dischargeDate)}</div>
                </div>
              )}
            </div>
            <div><label className="form-label">진단명</label><input className="form-input" value={patient.diagnosis} onChange={e => setField('diagnosis', e.target.value)} /></div>
            <div><label className="form-label">메모</label><textarea className="form-input" value={patient.notes} onChange={e => setField('notes', e.target.value)} rows={2} /></div>
            <div className={`flex items-center gap-2 p-3 rounded-lg border-2 cursor-pointer ${patient.isSurgery ? 'bg-orange-50 border-orange-200' : 'bg-gray-50 border-gray-200'}`} onClick={() => setField('isSurgery', !patient.isSurgery)}>
              <input type="checkbox" checked={patient.isSurgery} readOnly className="w-4 h-4" />
              <span className="text-sm font-bold">수술 환자 (자동 전환 예외)</span>
            </div>
          </div>
        )}
        <div className="flex justify-between mt-6">
          <button className="btn btn-danger" onClick={() => onSave({...bed, status: 'empty', patient: {...EMPTY_PATIENT}})}>병상 비우기</button>
          <div className="flex gap-2">
            <button className="btn btn-gray" onClick={onClose}>취소</button>
            <button className="btn btn-primary" onClick={() => onSave({...bed, status, patient: status === 'empty' ? {...EMPTY_PATIENT} : patient})}>저장</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── 컴포넌트: SettingsModal ── */
function SettingsModal({ settings, onSave, onClose }) {
  const [form, setForm] = useState({ ...settings });
  const set = (f, v) => setForm(p => ({ ...p, [f]: v }));
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box">
        <h2 className="text-xl font-extrabold mb-4">병동 설정</h2>
        <div className="space-y-4">
          <div><label className="form-label">병동 이름</label><input className="form-input" value={form.wardName} onChange={e => set('wardName', e.target.value)} /></div>
          <div className="grid grid-cols-2 gap-2">
            <div><label className="form-label">총 병상 수</label><input className="form-input" type="number" value={form.totalBeds} onChange={e => set('totalBeds', e.target.value)} /></div>
            <div><label className="form-label">시작 번호</label><input className="form-input" type="number" value={form.startBedNumber} onChange={e => set('startBedNumber', e.target.value)} /></div>
          </div>
          <div className="grid grid-cols-2 gap-2">
            <div><label className="form-label">오전 마감</label><input className="form-input" type="time" value={form.morningCutoff} onChange={e => set('morningCutoff', e.target.value)} /></div>
            <div><label className="form-label">오후 마감</label><input className="form-input" type="time" value={form.afternoonCutoff} onChange={e => set('afternoonCutoff', e.target.value)} /></div>
          </div>
        </div>
        <div className="flex justify-end gap-2 mt-6">
          <button className="btn btn-gray" onClick={onClose}>취소</button>
          <button className="btn btn-primary" onClick={() => onSave(form)}>설정 저장</button>
        </div>
      </div>
    </div>
  );
}

/* ── 컴포넌트: SyncIndicator ── */
function SyncIndicator({ status }) {
  if (status === 'idle') return null;
  const map = {
    saving: { cls: 'sync-saving', icon: '⟳', text: '저장 중...' },
    saved:  { cls: 'sync-ok',     icon: '✓', text: '동기화 완료' },
    error:  { cls: 'sync-error',  icon: '✕', text: '동기화 오류' },
  };
  const cfg = map[status];
  if (!cfg) return null;
  return (
    <span className={`sync-indicator ${cfg.cls}`}>
      <span className={status === 'saving' ? 'spin' : ''}>{cfg.icon}</span> {cfg.text}
    </span>
  );
}

/* ── 컴포넌트: Login ── */
function Login({ onLogin }) {
  const [isSignUp, setIsSignUp] = useState(false);
  const [isLoading, setIsLoading] = useState(false);
  const [form, setForm] = useState({ email: '', password: '', confirmPassword: '' });
  const setField = (f, v) => setForm(p => ({ ...p, [f]: v }));

  const handleSubmit = async (e) => {
    e.preventDefault();
    setIsLoading(true);
    try {
      if (isSignUp) {
        if (form.password !== form.confirmPassword) {
          alert('비밀번호가 일치하지 않습니다.');
          setIsLoading(false);
          return;
        }
        const uid = await signUpUser(form.email, form.password);
        onLogin(uid);
      } else {
        const uid = await signInUser(form.email, form.password);
        onLogin(uid);
      }
    } catch (err) {
      alert(err.message || '인증 중 오류가 발생했습니다.');
      console.error(err);
    } finally {
      setIsLoading(false);
    }
  };

  return (
    <div className="flex items-center justify-center min-h-screen bg-gray-100 p-4">
      <div className="bg-white p-10 rounded-2xl shadow-xl text-center w-full" style={{ maxWidth: '520px' }}>
        <h1 className="text-2xl font-black mb-2" style={{ whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>210정형외과 병동관리시스템</h1>
        <p className="text-gray-500 mb-8 text-sm">여러 기기에서 병동 현황을 동기화하려면 로그인하세요.</p>
        <form onSubmit={handleSubmit} className="space-y-4">
          <input type="email" placeholder="이메일" value={form.email} onChange={e => setField('email', e.target.value)} className="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required />
          <input type="password" placeholder="비밀번호" value={form.password} onChange={e => setField('password', e.target.value)} className="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required />
          {isSignUp && (
            <input type="password" placeholder="비밀번호 확인" value={form.confirmPassword} onChange={e => setField('confirmPassword', e.target.value)} className="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required />
          )}
          <button type="submit" disabled={isLoading} className="w-full bg-blue-500 text-white py-3 rounded-lg font-bold hover:bg-blue-600 disabled:opacity-50">
            {isSignUp ? '회원가입' : '로그인'}
          </button>
        </form>
        <button type="button" onClick={() => setIsSignUp(!isSignUp)} className="mt-4 text-blue-500 hover:underline">
          {isSignUp ? '이미 계정이 있으신가요? 로그인' : '계정이 없으신가요? 회원가입'}
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   메인 앱
   ══════════════════════════════════════ */
function App() {
  const [isLoggedIn, setIsLoggedIn] = useState(false);
  const [userId, setUserId] = useState(null);
  const [isCheckingAuth, setIsCheckingAuth] = useState(true);

  const [filter, setFilter] = useState('all');
  const [selectedBed, setSelectedBed] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [nowDisplay, setNowDisplay] = useState(getNowDisplay());

  // Firebase 인증 상태 감지 (자동 로그인)
  useEffect(() => {
    const unsub = auth.onAuthStateChanged((user) => {
      if (user) { setUserId(user.uid); setIsLoggedIn(true); }
      else      { setIsLoggedIn(false); setUserId(null); }
      setIsCheckingAuth(false);
    });
    return () => unsub();
  }, []);

  // 실시간 동기화 훅
  const { settings, beds, updateSettings, updateBeds, syncStatus } = useFirestoreSync(userId);

  // 시계 업데이트
  useEffect(() => {
    const tick = setInterval(() => setNowDisplay(getNowDisplay()), 60000);
    return () => clearInterval(tick);
  }, []);

  const stats = useMemo(() => {
    const c = { all: beds.length };
    Object.keys(STATUS).forEach(k => c[k] = beds.filter(b => b.status === k).length);
    return c;
  }, [beds]);

  const filteredBeds = useMemo(() => filter === 'all' ? beds : beds.filter(b => b.status === filter), [beds, filter]);

  if (isCheckingAuth) {
    return (
      <div className="flex items-center justify-center min-h-screen bg-gray-100">
        <div className="text-xl font-bold text-gray-700">로그인 상태 확인 중...</div>
      </div>
    );
  }

  if (!isLoggedIn) return <Login onLogin={(uid) => { setUserId(uid); setIsLoggedIn(true); }} />;

  return (
    <div className="max-w-7xl mx-auto p-4">
      <header className="bg-white p-5 rounded-2xl shadow-sm flex justify-between items-center mb-4">
        <div>
          <h1 className="text-2xl font-black text-gray-900">{settings.wardName}</h1>
          <div className="flex items-center gap-3 mt-1">
            <p className="text-xs text-gray-400">{nowDisplay.dateStr} {nowDisplay.timeStr} • 입원 {beds.filter(b => b.status !== 'empty').length}명</p>
            <SyncIndicator status={syncStatus} />
          </div>
        </div>
        <div className="flex items-center gap-2">
          <button className="btn btn-gray" onClick={() => setShowSettings(true)}>환경 설정</button>
          <button className="btn btn-gray" onClick={async () => { await signOutUser(); setIsLoggedIn(false); setUserId(null); }}>로그아웃</button>
        </div>
      </header>

      <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-2 mb-4">
        <div onClick={() => setFilter('all')} className={`p-3 rounded-xl border-2 cursor-pointer transition-all ${filter === 'all' ? 'bg-gray-800 border-gray-800 text-white' : 'bg-white'}`}>
          <div className="text-xl font-black">{stats.all}</div>
          <div className="text-[10px] opacity-80 uppercase font-bold">전체</div>
        </div>
        {Object.entries(STATUS).map(([key, cfg]) => (
          <div key={key} onClick={() => setFilter(key)} className={`p-3 rounded-xl border-2 cursor-pointer transition-all ${filter === key ? 'border-current' : 'bg-white opacity-60'}`} style={{ color: cfg.color, borderColor: filter === key ? cfg.color : '#e5e7eb', background: filter === key ? cfg.bg : '' }}>
            <div className="text-xl font-black">{stats[key]}</div>
            <div className="text-[10px] text-gray-500 font-bold">{cfg.label}</div>
          </div>
        ))}
      </div>

      <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-3">
        {filteredBeds.map(bed => (
          <BedCard
            key={bed.id} bed={bed} settings={settings}
            onClick={setSelectedBed}
            onQuickDischarge={(b) => updateBeds(prev => prev.map(x => x.id === b.id ? {...x, status: 'empty', patient: {...EMPTY_PATIENT}} : x))}
          />
        ))}
      </div>

      {selectedBed && (
        <BedModal
          bed={selectedBed}
          onClose={() => setSelectedBed(null)}
          onSave={(updated) => {
            updateBeds(prev => prev.map(b => b.id === updated.id ? updated : b));
            setSelectedBed(null);
          }}
        />
      )}
      {showSettings && (
        <SettingsModal
          settings={settings}
          onClose={() => setShowSettings(false)}
          onSave={(s) => {
            updateSettings(s);
            updateBeds(prev => makeBeds(parseInt(s.totalBeds), parseInt(s.startBedNumber), s.bedPrefix, prev));
            setShowSettings(false);
          }}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>


</body></html>

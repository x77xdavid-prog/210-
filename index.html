    .btn:hover{opacity:0.88;} .btn:active{transform:scale(0.97);}
    .btn-primary{background:#3b82f6;color:white;} .btn-danger{background:#ef4444;color:white;}
    .btn-gray{background:#e5e7eb;color:#374151;} .btn-green{background:#22c55e;color:white;}
    .btn-sm{padding:5px 11px;font-size:12px;}
    ::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:99px;}
    .status-dot{display:inline-block;width:9px;height:9px;border-radius:50%;flex-shrink:0;}
    .section-divider{border:none;border-top:1px solid #f0f0f0;margin:16px 0;}
    .sync-indicator{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;}
    .sync-ok{background:#dcfce7;color:#166534;} .sync-saving{background:#fef9c3;color:#854d0e;} .sync-error{background:#fee2e2;color:#991b1b;}
    @keyframes spin{to{transform:rotate(360deg);}} .spin{animation:spin 1s linear infinite;}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

const STATUS = {
  empty:                { label:'비어 있음',       color:'#9ca3af', bg:'#f9fafb', border:'#e5e7eb', textColor:'#6b7280', badgeBg:'#e5e7eb',  badgeText:'#4b5563' },
  admitted:             { label:'입원 중',         color:'#3b82f6', bg:'#eff6ff', border:'#bfdbfe', textColor:'#1e40af', badgeBg:'#3b82f6',  badgeText:'#ffffff' },
  morning_discharge:    { label:'오전 퇴원 예정',  color:'#f59e0b', bg:'#fffbeb', border:'#fde68a', textColor:'#92400e', badgeBg:'#f59e0b',  badgeText:'#ffffff' },
  afternoon_discharge:  { label:'오후 퇴원 예정',  color:'#f97316', bg:'#fff7ed', border:'#fed7aa', textColor:'#9a3412', badgeBg:'#f97316',  badgeText:'#ffffff' },
  afternoon_admission:  { label:'오후 입원 예정',  color:'#22c55e', bg:'#f0fdf4', border:'#bbf7d0', textColor:'#14532d', badgeBg:'#22c55e',  badgeText:'#ffffff' },
  next_day_discharge:   { label:'다음날 퇴원 예정',color:'#a855f7', bg:'#faf5ff', border:'#e9d5ff', textColor:'#581c87', badgeBg:'#a855f7',  badgeText:'#ffffff' },
  provisional_discharge:{ label:'가퇴원',          color:'#f43f5e', bg:'#fff1f2', border:'#fecdd3', textColor:'#881337', badgeBg:'#f43f5e',  badgeText:'#ffffff' },
};

const DEFAULT_SETTINGS = { wardName:'210정형외과병동관리시스템', totalBeds:20, bedPrefix:'', startBedNumber:1, morningCutoff:'12:00', afternoonCutoff:'18:00', autoTransition:false };
const EMPTY_PATIENT = { name:'', age:'', gender:'', diagnosis:'', notes:'', isSurgery:false, admittedDate:'', dischargeDate:'' };

/* ── Firebase 초기화 (단 한 번만) ── */
const FIREBASE_CONFIG = {
  apiKey: 'AIzaSyDNskn4Kmkha07oGXcEXVhhNd9MvGOgcpI',
  authDomain: 'gen-lang-client-0584117357.firebaseapp.com',
  projectId: 'gen-lang-client-0584117357',
  storageBucket: 'gen-lang-client-0584117357.firebasestorage.app',
  messagingSenderId: '117986366738',
  appId: '1:117986366738:web:08d7b55ac07479d9cf4fcb',
};
if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.firestore();
/* 자동 로그인 영구 유지 — 브라우저 닫아도 로그인 상태 보존 */
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(e=>console.warn(e));

/* ── 유틸리티 ── */
function parseTime(str){ const [h=0,m=0]=(str||'').split(':').map(Number); return h*60+m; }
function getCurrentMinutes(){ const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function isOverdue(status,settings){
  const cur=getCurrentMinutes();
  if(status==='morning_discharge') return cur>parseTime(settings.morningCutoff);
  if(status==='afternoon_discharge') return cur>parseTime(settings.afternoonCutoff);
  return false;
}
function getNowDisplay(){
  const n=new Date();
  return {
    timeStr: n.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),
    dateStr: n.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'}),
  };
}
function getDdayDisplay(dateStr){
  if(!dateStr) return '';
  const target=new Date(`${dateStr}T00:00:00`);
  const today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.round((target-today)/86400000);
  if(diff===0) return 'D-day';
  return diff>0?`D-${diff}`:`D+${Math.abs(diff)}`;
}
function makeBeds(total,start,prefix,existing=[]){
  return Array.from({length:total},(_,i)=>{
    const id=`${prefix}${start+i}`;
    return existing.find(b=>b.id===id)||{id,bedNumber:id,status:'empty',patient:{...EMPTY_PATIENT}};
  });
}
function loadLS(){ try{return JSON.parse(localStorage.getItem('wardData_v2'));}catch{return null;} }
function saveLS(data){ try{localStorage.setItem('wardData_v2',JSON.stringify(data));}catch{} }

/* ── Firebase 인증 ── */
function signUpUser(e,p){ return auth.createUserWithEmailAndPassword(e,p).then(r=>r.user.uid); }
function signInUser(e,p){ return auth.signInWithEmailAndPassword(e,p).then(r=>r.user.uid); }
function signOutUser(){ return auth.signOut(); }

function useFirestorePolling(userId){
  const [settings,setSettings]=useState(()=>{ const s=loadLS(); return {...DEFAULT_SETTINGS,...(s?.settings||{})}; });
  const [beds,setBeds]=useState(()=>{ const s=loadLS(); return s?.beds?.length?s.beds:makeBeds(DEFAULT_SETTINGS.totalBeds,DEFAULT_SETTINGS.startBedNumber,DEFAULT_SETTINGS.bedPrefix); });
  const [syncStatus,setSyncStatus]=useState('idle');
  const settingsRef  = useRef(settings);
  const bedsRef      = useRef(beds);
  const debounceTimer= useRef(null);
  const isMounted    = useRef(true);
  const lastSaveTime = useRef(0);
  settingsRef.current=settings;
  bedsRef.current=beds;

  const fetchFromServer = useCallback(async()=>{
    if(!userId||!navigator.onLine) return;
    try {
      const doc = await db.collection('wardData').doc(userId).get();
      if(!isMounted.current) return;
      if(doc.exists && doc.data()?.beds){
        const d = doc.data();
        const serverTs = d.updatedAt?.toMillis?.() || 0;
        if(serverTs > lastSaveTime.current){
          if(d.settings) setSettings(d.settings);
          if(Array.isArray(d.beds)) setBeds(d.beds);
          saveLS({settings:d.settings,beds:d.beds});
        }
      }
    } catch(err){ console.warn('Poll failed:',err.message); }
  },[userId]);

  const flushSave = useCallback(async(s,b)=>{
    if(!userId) return;
    if(!navigator.onLine){ setSyncStatus('offline'); return; }
    setSyncStatus('saving');
    try {
      await db.collection('wardData').doc(userId).set({
        settings:s, beds:b,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      if(!isMounted.current) return;
      lastSaveTime.current = Date.now();
      setSyncStatus('saved');
      setTimeout(()=>{ if(isMounted.current) setSyncStatus('idle'); },2000);
    } catch(err){
      if(!isMounted.current) return;
      console.warn('Save error:', err.code, err.message);
      // Spark 한도 초과 시 로컬에는 이미 저장됨 — 데이터 손실 없음
      setSyncStatus('error');
    }
  },[userId]);

  const saveNow = useCallback((s,b)=>{
    saveLS({settings:s,beds:b});
    setSyncStatus('saving');
    if(debounceTimer.current) clearTimeout(debounceTimer.current);
    debounceTimer.current = setTimeout(()=>flushSave(s,b), 1500);
  },[flushSave]);

  const updateSettings = useCallback((ns)=>{ setSettings(ns); saveNow(ns,bedsRef.current); },[saveNow]);
  const updateBeds = useCallback((uov)=>{
    setBeds(prev=>{
      const nb=typeof uov==='function'?uov(prev):uov;
      saveNow(settingsRef.current,nb);
      return nb;
    });
  },[saveNow]);

  useEffect(()=>{
    isMounted.current=true;
    if(!userId) return;
    fetchFromServer();
    const pollTimer = setInterval(fetchFromServer, 30000);
    const onVisibility=()=>{ if(document.visibilityState==='visible') fetchFromServer(); };
    document.addEventListener('visibilitychange', onVisibility);
    const onOnline=()=>fetchFromServer();
    window.addEventListener('online', onOnline);
    window.addEventListener('offline',()=>setSyncStatus('offline'));
    return ()=>{
      isMounted.current=false;
      clearInterval(pollTimer);
      if(debounceTimer.current) clearTimeout(debounceTimer.current);
      document.removeEventListener('visibilitychange', onVisibility);
      window.removeEventListener('online', onOnline);
    };
  },[userId, fetchFromServer]);

  return {settings,beds,updateSettings,updateBeds,syncStatus};
}
/* ── 알림음 (Web Audio API, 외부파일 불필요) ── */
let _audioCtx = null;
function getAudioCtx(){ if(!_audioCtx) _audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return _audioCtx; }
function playTone(freq,type,duration,volume,startTime){
  try{
    const c=getAudioCtx();
    const osc=c.createOscillator();
    const gain=c.createGain();
    osc.connect(gain); gain.connect(c.destination);
    osc.type=type;
    osc.frequency.setValueAtTime(freq,startTime);
    gain.gain.setValueAtTime(volume,startTime);
    gain.gain.exponentialRampToValueAtTime(0.001,startTime+duration);
    osc.start(startTime); osc.stop(startTime+duration);
  }catch(e){}
}
function soundDing(){
  // 띵동 — 퇴원 D-1
  const c=getAudioCtx(); const t=c.currentTime;
  playTone(880,'sine',0.8,0.4,t);
  playTone(1320,'sine',0.5,0.2,t+0.1);
}
function soundDouble(){
  // 띵띵 — 장기입원 7일 초과
  const c=getAudioCtx(); const t=c.currentTime;
  playTone(660,'sine',0.4,0.35,t);
  playTone(660,'sine',0.4,0.35,t+0.5);
}
function soundAlert(){
  // 삐빅 — 시간 초과
  const c=getAudioCtx(); const t=c.currentTime;
  playTone(440,'square',0.15,0.3,t);
  playTone(550,'square',0.15,0.3,t+0.18);
}

/* ── 알림 유틸리티 ── */
function calcDday(dateStr){
  if(!dateStr) return null;
  const target=new Date(dateStr+'T00:00:00');
  const today=new Date(); today.setHours(0,0,0,0);
  return Math.round((target-today)/86400000);
}
function calcStayDays(admittedDate){
  if(!admittedDate) return 0;
  const start=new Date(admittedDate+'T00:00:00');
  const today=new Date(); today.setHours(0,0,0,0);
  return Math.round((today-start)/86400000);
}

/* ── 알림 배너 컴포넌트 ── */
function AlertBanners({beds, dismissed, onDismiss}){
  // 퇴원 D-1 환자 (내일 퇴원)
  const tomorrowDischarge = beds.filter(b=>{
    if(!b.patient?.dischargeDate) return false;
    return calcDday(b.patient.dischargeDate)===1;
  });
  // 장기입원 7일 초과
  const longStay = beds.filter(b=>{
    if(b.status==='empty'||!b.patient?.admittedDate) return false;
    return calcStayDays(b.patient.admittedDate)>=7;
  });
  // 오전 퇴원 시간 초과
  const overdueAM = beds.filter(b=>b.status==='morning_discharge'&&isOverdue(b.status,{morningCutoff:'12:00',afternoonCutoff:'18:00'}));

  // 알림음: 배너가 새로 뜰 때 소리 재생
  const prevDismissed = useRef(dismissed);
  useEffect(()=>{
    // 이미 dismissed된 항목 제외하고 활성 알림에 소리
    if(tomorrowDischarge.length>0 && !dismissed.includes('discharge') && prevDismissed.current.includes('discharge')===false){
      soundDing();
    } else if(longStay.length>0 && !dismissed.includes('longstay') && prevDismissed.current.includes('longstay')===false){
      soundDouble();
    } else if(overdueAM.length>0 && !dismissed.includes('overdueAM') && prevDismissed.current.includes('overdueAM')===false){
      soundAlert();
    }
    prevDismissed.current = dismissed;
  },[tomorrowDischarge.length, longStay.length, overdueAM.length, dismissed]);

  const banners = [];

  if(tomorrowDischarge.length>0 && !dismissed.includes('discharge')){
    banners.push(
      <div key="discharge" style={{background:'#fff1f2',border:'0.5px solid #fecdd3',borderRadius:12,padding:'14px 16px',marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:'#881337',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:'#f43f5e',display:'inline-block',flexShrink:0}}/>
          내일 퇴원 예정 환자 {tomorrowDischarge.length}명
        </div>
        {tomorrowDischarge.map(b=>(
          <div key={b.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'0.5px solid rgba(0,0,0,0.06)'}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'#881337'}}>{b.bedNumber}호 {b.patient.name||'이름 없음'}</div>
              <div style={{fontSize:11,color:'#be123c',marginTop:1}}>{b.patient.diagnosis||'진단명 없음'} • 퇴원일 {b.patient.dischargeDate}</div>
            </div>
            <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:99,background:'#fecdd3',color:'#881337',whiteSpace:'nowrap'}}>D-1</span>
          </div>
        ))}
        <button onClick={()=>onDismiss('discharge')} style={{marginTop:8,fontSize:11,color:'#6b7280',background:'none',border:'0.5px solid #e5e7eb',borderRadius:6,padding:'3px 10px',cursor:'pointer'}}>확인 (닫기)</button>
      </div>
    );
  }

  if(longStay.length>0 && !dismissed.includes('longstay')){
    banners.push(
      <div key="longstay" style={{background:'#fffbeb',border:'0.5px solid #fde68a',borderRadius:12,padding:'14px 16px',marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:'#92400e',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:'#f59e0b',display:'inline-block',flexShrink:0}}/>
          장기입원 7일 초과 환자 {longStay.length}명
        </div>
        {longStay.map(b=>(
          <div key={b.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'0.5px solid rgba(0,0,0,0.06)'}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'#92400e'}}>{b.bedNumber}호 {b.patient.name||'이름 없음'}</div>
              <div style={{fontSize:11,color:'#b45309',marginTop:1}}>입원일 {b.patient.admittedDate} • {calcStayDays(b.patient.admittedDate)}일째 입원 중</div>
            </div>
            <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:99,background:'#fde68a',color:'#92400e',whiteSpace:'nowrap'}}>{calcStayDays(b.patient.admittedDate)}일 경과</span>
          </div>
        ))}
        <button onClick={()=>onDismiss('longstay')} style={{marginTop:8,fontSize:11,color:'#6b7280',background:'none',border:'0.5px solid #e5e7eb',borderRadius:6,padding:'3px 10px',cursor:'pointer'}}>확인 (닫기)</button>
      </div>
    );
  }

  if(overdueAM.length>0 && !dismissed.includes('overdueAM')){
    banners.push(
      <div key="overdueAM" style={{background:'#eff6ff',border:'0.5px solid #bfdbfe',borderRadius:12,padding:'14px 16px',marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:'#1e40af',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:'#3b82f6',display:'inline-block',flexShrink:0}}/>
          오전 퇴원 시간 초과 {overdueAM.length}명
        </div>
        {overdueAM.map(b=>(
          <div key={b.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'0.5px solid rgba(0,0,0,0.06)'}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'#1e40af'}}>{b.bedNumber}호 {b.patient.name||'이름 없음'}</div>
              <div style={{fontSize:11,color:'#1d4ed8',marginTop:1}}>오전 퇴원 예정 • 12:00 초과</div>
            </div>
            <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:99,background:'#bfdbfe',color:'#1e40af',whiteSpace:'nowrap'}}>시간 초과</span>
          </div>
        ))}
        <button onClick={()=>onDismiss('overdueAM')} style={{marginTop:8,fontSize:11,color:'#6b7280',background:'none',border:'0.5px solid #e5e7eb',borderRadius:6,padding:'3px 10px',cursor:'pointer'}}>확인 (닫기)</button>
      </div>
    );
  }

  if(banners.length===0) return null;
  return <div style={{marginBottom:8}}>{banners}</div>;
}

/* ── BedCard ── */
function BedCard({bed,settings,onClick,onQuickDischarge}){
  const cfg=STATUS[bed.status]||STATUS.empty;
  const overdue=isOverdue(bed.status,settings);
  const isEmpty=bed.status==='empty';
  const hasPatient=!isEmpty&&bed.patient.name;
  return(
    <div className={`bed-card rounded-xl border-2 p-3${overdue?' overdue':''}`}
      style={{background:cfg.bg,borderColor:cfg.border,boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}
      onClick={()=>onClick(bed)}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:4,marginBottom:7}}>
        <span style={{fontWeight:800,fontSize:17,color:'#111827',letterSpacing:'-0.5px'}}>{bed.bedNumber}호</span>
        <div style={{display:'flex',gap:4,alignItems:'center',flexWrap:'wrap',justifyContent:'flex-end'}}>
          {calcDday(bed.patient?.dischargeDate)===1&&<span style={{fontSize:9,fontWeight:700,padding:'2px 6px',borderRadius:99,background:'#fecdd3',color:'#881337'}}>D-1</span>}
          {calcStayDays(bed.patient?.admittedDate)>=7&&bed.status!=='empty'&&<span style={{fontSize:9,fontWeight:700,padding:'2px 6px',borderRadius:99,background:'#fde68a',color:'#92400e'}}>장기</span>}
          <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:999,whiteSpace:'nowrap',background:cfg.badgeBg,color:cfg.badgeText}}>{cfg.label}</span>
        </div>
      </div>
      {hasPatient?(
        <div>
          <div style={{fontSize:13,fontWeight:700,color:cfg.textColor,marginBottom:2}}>
            {bed.patient.name}{bed.patient.gender?`・${bed.patient.gender==='M'?'남':'여'}`:''}{bed.patient.age?`・${bed.patient.age}세`:''}
          </div>
          {bed.patient.diagnosis&&<div style={{fontSize:11,color:'#9ca3af',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{bed.patient.diagnosis}</div>}
          {bed.patient.admittedDate&&<div style={{fontSize:11,fontWeight:600,color:'#374151',marginTop:4}}>입원일 {bed.patient.admittedDate}</div>}
          {bed.patient.dischargeDate&&<div style={{fontSize:11,fontWeight:600,color:'#374151',marginTop:4}}>퇴원일 {bed.patient.dischargeDate} ・ {getDdayDisplay(bed.patient.dischargeDate)}</div>}
          {bed.patient.notes&&<div style={{fontSize:11,fontWeight:600,color:'#374151',marginTop:4,whiteSpace:'normal',wordBreak:'break-word'}}>메모 {bed.patient.notes}</div>}
          {bed.patient.isSurgery&&<div style={{fontSize:10,color:'#f97316',fontWeight:700,marginTop:3}}>[수술 환자]</div>}
        </div>
      ):<div style={{fontSize:12,color:'#d1d5db',fontStyle:'italic'}}>{isEmpty?'빈 병상':'정보 없음'}</div>}
      {overdue&&(
        <div style={{marginTop:6,display:'flex',alignItems:'center',justifyContent:'space-between'}} onClick={e=>e.stopPropagation()}>
          <span style={{fontSize:11,color:'#ef4444',fontWeight:700}}>시간 초과</span>
          <button className="btn btn-sm btn-danger" onClick={e=>{e.stopPropagation();onQuickDischarge(bed);}} style={{padding:'3px 8px',fontSize:11}}>퇴원 완료</button>
        </div>
      )}
    </div>
  );
}

/* ── BedModal ── */
function BedModal({bed,onSave,onClose}){
  const [status,setStatus]=useState(bed.status);
  const [patient,setPatient]=useState({...EMPTY_PATIENT,...bed.patient});
  const setField=(f,v)=>setPatient(p=>({...p,[f]:v}));
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div className="flex justify-between items-center mb-4">
          <h2 className="text-xl font-extrabold">{bed.bedNumber}호 병상 편집</h2>
          <button className="btn btn-gray btn-sm" onClick={onClose}>닫기</button>
        </div>
        <div className="mb-4">
          <div className="form-label">병상 상태</div>
          <div className="grid grid-cols-2 gap-2">
            {Object.entries(STATUS).map(([key,scfg])=>(
              <button key={key} onClick={()=>setStatus(key)}
                className={`flex items-center gap-2 p-2 rounded-lg border-2 text-xs transition-all ${status===key?'font-bold':'bg-white text-gray-500'}`}
                style={{borderColor:status===key?scfg.color:'#e5e7eb',background:status===key?scfg.bg:''}}>
                <span className="status-dot" style={{background:scfg.color}}/> {scfg.label}
              </button>
            ))}
          </div>
        </div>
        {status!=='empty'&&(
          <div className="space-y-3">
            <hr className="section-divider"/>
            <div className="grid grid-cols-2 gap-2">
              <div><label className="form-label">환자명</label><input className="form-input" value={patient.name} onChange={e=>setField('name',e.target.value)}/></div>
              <div><label className="form-label">나이</label><input className="form-input" type="number" value={patient.age} onChange={e=>setField('age',e.target.value)}/></div>
            </div>
            <div className="grid grid-cols-2 gap-2">
              <div><label className="form-label">성별</label>
                <select className="form-input" value={patient.gender} onChange={e=>setField('gender',e.target.value)}>
                  <option value="">선택</option><option value="M">남</option><option value="F">여</option>
                </select>
              </div>
              <div><label className="form-label">입원일</label><input className="form-input" type="date" value={patient.admittedDate} onChange={e=>setField('admittedDate',e.target.value)}/></div>
            </div>
            <div className="grid grid-cols-2 gap-2">
              <div><label className="form-label">퇴원일</label><input className="form-input" type="date" value={patient.dischargeDate} onChange={e=>setField('dischargeDate',e.target.value)}/></div>
              {patient.dischargeDate&&<div><label className="form-label">남은 D-day</label><div className="form-input" style={{background:'#fff',cursor:'default'}}>{getDdayDisplay(patient.dischargeDate)}</div></div>}
            </div>
            <div><label className="form-label">진단명</label><input className="form-input" value={patient.diagnosis} onChange={e=>setField('diagnosis',e.target.value)}/></div>
            <div><label className="form-label">메모</label><textarea className="form-input" value={patient.notes} onChange={e=>setField('notes',e.target.value)} rows={2}/></div>
            <div className={`flex items-center gap-2 p-3 rounded-lg border-2 cursor-pointer ${patient.isSurgery?'bg-orange-50 border-orange-200':'bg-gray-50 border-gray-200'}`}
              onClick={()=>setField('isSurgery',!patient.isSurgery)}>
              <input type="checkbox" checked={patient.isSurgery} readOnly className="w-4 h-4"/>
              <span className="text-sm font-bold">수술 환자 (자동 전환 예외)</span>
            </div>
          </div>
        )}
        <div className="flex justify-between mt-6">
          <button className="btn btn-danger" onClick={()=>onSave({...bed,status:'empty',patient:{...EMPTY_PATIENT}})}>병상 비우기</button>
          <div className="flex gap-2">
            <button className="btn btn-gray" onClick={onClose}>취소</button>
            <button className="btn btn-primary" onClick={()=>onSave({...bed,status,patient:status==='empty'?{...EMPTY_PATIENT}:patient})}>저장</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── SettingsModal ── */
function SettingsModal({settings,onSave,onClose}){
  const [form,setForm]=useState({...settings});
  const set=(f,v)=>setForm(p=>({...p,[f]:v}));
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <h2 className="text-xl font-extrabold mb-4">병동 설정</h2>
        <div className="space-y-4">
          <div><label className="form-label">병동 이름</label><input className="form-input" value={form.wardName} onChange={e=>set('wardName',e.target.value)}/></div>
          <div className="grid grid-cols-2 gap-2">
            <div><label className="form-label">총 병상 수</label><input className="form-input" type="number" value={form.totalBeds} onChange={e=>set('totalBeds',e.target.value)}/></div>
            <div><label className="form-label">시작 번호</label><input className="form-input" type="number" value={form.startBedNumber} onChange={e=>set('startBedNumber',e.target.value)}/></div>
          </div>
          <div className="grid grid-cols-2 gap-2">
            <div><label className="form-label">오전 마감</label><input className="form-input" type="time" value={form.morningCutoff} onChange={e=>set('morningCutoff',e.target.value)}/></div>
            <div><label className="form-label">오후 마감</label><input className="form-input" type="time" value={form.afternoonCutoff} onChange={e=>set('afternoonCutoff',e.target.value)}/></div>
          </div>
        </div>
        <div className="flex justify-end gap-2 mt-6">
          <button className="btn btn-gray" onClick={onClose}>취소</button>
          <button className="btn btn-primary" onClick={()=>onSave(form)}>설정 저장</button>
        </div>
      </div>
    </div>
  );
}

/* ── SyncBar ── */
function SyncIndicator({status}){
  const map={
    saving:{cls:'sync-saving',icon:'⟳',text:'저장 중...',spin:true},
    saved: {cls:'sync-ok',   icon:'✓',text:'저장됨',spin:false},
    error: {cls:'sync-error',icon:'✕',text:'저장 실패',spin:false},
    offline:{cls:'sync-offline',icon:'⊘',text:'오프라인',spin:false},
  };
  const cfg=map[status];
  if(!cfg) return null;
  return(
    <div style={{position:'fixed',top:0,left:0,right:0,zIndex:999,display:'flex',alignItems:'center',justifyContent:'center',padding:'4px',fontSize:'11px',fontWeight:600}}
      className={cfg.cls}>
      <span className={cfg.spin?'spin':''}>{cfg.icon}</span>&nbsp;{cfg.text}
    </div>
  );
}

/* ── Login ── */
function Login({onLogin}){
  const [isSignUp,setIsSignUp]=useState(false);
  const [isLoading,setIsLoading]=useState(false);
  const [form,setForm]=useState({email:'',password:'',confirmPassword:''});
  const setField=(f,v)=>setForm(p=>({...p,[f]:v}));
  const handleSubmit=async(e)=>{
    e.preventDefault(); setIsLoading(true);
    try{
      if(isSignUp){
        if(form.password!==form.confirmPassword){alert('비밀번호가 일치하지 않습니다.');setIsLoading(false);return;}
        onLogin(await signUpUser(form.email,form.password));
      } else { onLogin(await signInUser(form.email,form.password)); }
    }catch(err){alert(err.message||'인증 중 오류가 발생했습니다.');}
    finally{setIsLoading(false);}
  };
  return(
    <div className="flex items-center justify-center min-h-screen bg-gray-100 p-4">
      <div className="bg-white p-10 rounded-2xl shadow-xl text-center w-full" style={{maxWidth:'520px'}}>
        <h1 className="text-2xl font-black mb-2" style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>210정형외과 병동관리시스템</h1>
        <p className="text-gray-500 mb-8 text-sm">여러 기기에서 병동 현황을 동기화하려면 로그인하세요.</p>
        <form onSubmit={handleSubmit} className="space-y-4">
          <input type="email" placeholder="이메일" value={form.email} onChange={e=>setField('email',e.target.value)} className="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required/>
          <input type="password" placeholder="비밀번호" value={form.password} onChange={e=>setField('password',e.target.value)} className="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required/>
          {isSignUp&&<input type="password" placeholder="비밀번호 확인" value={form.confirmPassword} onChange={e=>setField('confirmPassword',e.target.value)} className="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required/>}
          <button type="submit" disabled={isLoading} className="w-full bg-blue-500 text-white py-3 rounded-lg font-bold hover:bg-blue-600 disabled:opacity-50">
            {isSignUp?'회원가입':'로그인'}
          </button>
        </form>
        <button type="button" onClick={()=>setIsSignUp(!isSignUp)} className="mt-4 text-blue-500 hover:underline">
          {isSignUp?'이미 계정이 있으신가요? 로그인':'계정이 없으신가요? 회원가입'}
        </button>
      </div>
    </div>
  );
}

/* ── App ── */
function App(){
  const [isLoggedIn,setIsLoggedIn]=useState(false);
  const [userId,setUserId]=useState(null);
  const [isCheckingAuth,setIsCheckingAuth]=useState(true);
  const [filter,setFilter]=useState('all');
  const [dismissed,setDismissed]=useState([]);
  const handleDismiss=(key)=>setDismissed(prev=>[...prev,key]);
  // beds 업데이트 시 dismissed 초기화 → 새 알림이면 소리 다시 울림
  const prevBedsRef = useRef(beds);
  useEffect(()=>{
    const changed = JSON.stringify(beds) !== JSON.stringify(prevBedsRef.current);
    if(changed){
      setDismissed([]); // 병상 데이터 바뀌면 알림 다시 체크
      prevBedsRef.current = beds;
    }
  },[beds]);
  const [selectedBed,setSelectedBed]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [nowDisplay,setNowDisplay]=useState(getNowDisplay());

  useEffect(()=>{
    const unsub=auth.onAuthStateChanged((user)=>{
      if(user){setUserId(user.uid);setIsLoggedIn(true);}
      else{setIsLoggedIn(false);setUserId(null);}
      setIsCheckingAuth(false);
    });
    return()=>unsub();
  },[]);

  const {settings,beds,updateSettings,updateBeds,syncStatus}=useFirestorePolling(userId);

  useEffect(()=>{ const t=setInterval(()=>setNowDisplay(getNowDisplay()),60000); return()=>clearInterval(t); },[]);

  const stats=useMemo(()=>{ const c={all:beds.length}; Object.keys(STATUS).forEach(k=>c[k]=beds.filter(b=>b.status===k).length); return c; },[beds]);
  const filteredBeds=useMemo(()=>filter==='all'?beds:beds.filter(b=>b.status===filter),[beds,filter]);

  if(isCheckingAuth) return <div className="flex items-center justify-center min-h-screen bg-gray-100"><div className="text-xl font-bold text-gray-700">로그인 상태 확인 중...</div></div>;
  if(!isLoggedIn) return <Login onLogin={(uid)=>{setUserId(uid);setIsLoggedIn(true);}}/>;

  return(
    <div className="max-w-7xl mx-auto p-4" style={{position:'relative'}}>
      <SyncIndicator status={syncStatus}/>
      <header className="bg-white p-5 rounded-2xl shadow-sm flex justify-between items-center mb-4">
        <div>
          <h1 className="text-2xl font-black text-gray-900">{settings.wardName}</h1>
          <p className="text-xs text-gray-400 mt-1">{nowDisplay.dateStr} {nowDisplay.timeStr} • 입원 {beds.filter(b=>b.status!=='empty').length}명 • 30초 자동 동기화 • Spark 무료</p>
        </div>
        <div className="flex items-center gap-2">
          <button className="btn btn-gray" onClick={()=>setShowSettings(true)}>환경 설정</button>
          <button className="btn btn-gray" onClick={async()=>{ if(!window.confirm('로그아웃 하시겠습니까? 다음 접속 시 다시 로그인해야 합니다.')) return; await signOutUser();setIsLoggedIn(false);setUserId(null);}}>로그아웃</button>
        </div>
      </header>

      <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-2 mb-4">
        <div onClick={()=>setFilter('all')} className={`p-3 rounded-xl border-2 cursor-pointer transition-all ${filter==='all'?'bg-gray-800 border-gray-800 text-white':'bg-white'}`}>
          <div className="text-xl font-black">{stats.all}</div>
          <div className="text-[10px] opacity-80 uppercase font-bold">전체</div>
        </div>
        {Object.entries(STATUS).map(([key,cfg])=>(
          <div key={key} onClick={()=>setFilter(key)}
            className={`p-3 rounded-xl border-2 cursor-pointer transition-all ${filter===key?'border-current':'bg-white opacity-60'}`}
            style={{color:cfg.color,borderColor:filter===key?cfg.color:'#e5e7eb',background:filter===key?cfg.bg:''}}>
            <div className="text-xl font-black">{stats[key]}</div>
            <div className="text-[10px] text-gray-500 font-bold">{cfg.label}</div>
          </div>
        ))}
      </div>

      <AlertBanners beds={beds} dismissed={dismissed} onDismiss={handleDismiss}/>
      <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-3">
        {filteredBeds.map(bed=>(
          <BedCard key={bed.id} bed={bed} settings={settings} onClick={setSelectedBed}
            onQuickDischarge={(b)=>updateBeds(prev=>prev.map(x=>x.id===b.id?{...x,status:'empty',patient:{...EMPTY_PATIENT}}:x))}/>
        ))}
      </div>

      {selectedBed&&<BedModal bed={selectedBed} onClose={()=>setSelectedBed(null)}
        onSave={(updated)=>{updateBeds(prev=>prev.map(b=>b.id===updated.id?updated:b));setSelectedBed(null);}}/>}
      {showSettings&&<SettingsModal settings={settings} onClose={()=>setShowSettings(false)}
        onSave={(s)=>{updateSettings(s);updateBeds(prev=>makeBeds(parseInt(s.totalBeds),parseInt(s.startBedNumber),s.bedPrefix,prev));setShowSettings(false);}}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
